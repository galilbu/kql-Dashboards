name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_TENANT_ID: ${{ secrets.TENANT_ID }}
          VITE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          VITE_API_BASE_URL: /api

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: cd api && ruff check .

      - name: Format check with black
        run: cd api && black --check .

      - name: Audit dependencies
        run: pip-audit -r api/requirements.txt
        continue-on-error: true

      - name: Run tests
        run: cd api && python -m pytest tests/ -v

      - name: Package API for deployment
        run: |
          cd api
          zip -r ../api.zip . \
            --exclude "*.pyc" \
            --exclude "__pycache__/*" \
            --exclude ".python_packages/*" \
            --exclude "tests/*" \
            --exclude ".pytest_cache/*" \
            --exclude "requirements-dev.txt" \
            --exclude ".env"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-zip
          path: api.zip

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-frontend, build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Remove unsupported app settings for Flex Consumption
        run: |
          az functionapp config appsettings delete \
            --name secopskqldash-func \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --setting-names WEBSITE_RUN_FROM_PACKAGE \
            --output none 2>/dev/null || true

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-zip

      - name: Deploy Function App code (Flex Consumption — remote build)
        run: |
          az functionapp deployment source config-zip \
            --name secopskqldash-func \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src api.zip \
            --build-remote true \
            --timeout 600 || echo "::warning::Flex Consumption reported partial success — this is expected (logs recycled)"

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_DESERT_01CE1A503 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app
          output_location: ''
          skip_app_build: true
