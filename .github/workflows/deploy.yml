name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'
  PYTHON_VERSION: '3.11'

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Audit dependencies
        run: cd frontend && npm audit --audit-level=high
        continue-on-error: true

      - name: Build
        run: cd frontend && npm run build
        env:
          VITE_TENANT_ID: ${{ secrets.TENANT_ID }}
          VITE_CLIENT_ID: ${{ secrets.CLIENT_ID }}
          VITE_API_BASE_URL: /api

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  build-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: api/requirements*.txt

      - name: Install dependencies
        run: |
          cd api
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint with ruff
        run: cd api && ruff check .

      - name: Format check with black
        run: cd api && black --check .

      - name: Audit dependencies
        run: pip-audit -r api/requirements.txt
        continue-on-error: true

      - name: Run tests
        run: cd api && python -m pytest tests/ -v

      - name: Package API for deployment
        run: |
          cd api
          pip install -r requirements.txt --target .python_packages/lib/site-packages
          zip -r ../api.zip . --exclude "*.pyc" --exclude "__pycache__/*" --exclude "tests/*" --exclude "requirements-dev.txt"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-zip
          path: api.zip

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-frontend, build-api]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy infrastructure (Bicep)
        uses: azure/arm-deploy@v2
        with:
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resourceGroupName: ${{ secrets.AZURE_RESOURCE_GROUP }}
          template: infra/main.bicep
          parameters: >
            baseName=kqldash
            tenantId=${{ secrets.TENANT_ID }}
            clientId=${{ secrets.CLIENT_ID }}
            clientSecret=${{ secrets.CLIENT_SECRET }}
            workspaceId=${{ secrets.WORKSPACE_ID }}
            workspaceResourceId=${{ secrets.WORKSPACE_RESOURCE_ID }}
            localJwtSecret=${{ secrets.LOCAL_JWT_SECRET }}
            localSuperAdminEmails=${{ secrets.LOCAL_SUPER_ADMIN_EMAILS }}
          failOnStdErr: false

      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-zip

      - name: Deploy Function App code
        uses: azure/functions-action@v1
        with:
          app-name: kqldash-func
          package: api.zip

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: app

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_DESERT_01CE1A503 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: app
          output_location: ''
          skip_app_build: true
